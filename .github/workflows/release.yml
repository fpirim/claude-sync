name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semantic version bump"
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]
      dry_run:
        description: "Dry run (skip tag/push/release)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Compute next version
        id: ver
        run: |
          set -euo pipefail
          latest=$(git tag --list 'v*' --sort=-v:refname | head -1)
          if [ -z "$latest" ]; then
            current="0.0.0"
          else
            current="${latest#v}"
          fi
          IFS=. read -r major minor patch <<< "$current"
          case "${{ inputs.bump }}" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          next="v${major}.${minor}.${patch}"
          echo "previous=${latest:-<none>}" >> "$GITHUB_OUTPUT"
          echo "next=${next}" >> "$GITHUB_OUTPUT"
          echo "Bumping ${latest:-<none>} -> ${next}"

      - name: Generate full CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ steps.ver.outputs.next }} --output CHANGELOG.md
        env:
          OUTPUT: CHANGELOG.md

      - name: Generate release notes (this version only)
        id: notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ steps.ver.outputs.next }} --unreleased --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Build cross-platform binaries
        run: make dist
        env:
          VERSION: ${{ steps.ver.outputs.next }}

      - name: Checksums
        run: |
          cd dist
          sha256sum claude-sync-* > SHA256SUMS

      - name: Commit CHANGELOG
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No CHANGELOG changes to commit."
          else
            git commit -m "chore(release): ${{ steps.ver.outputs.next }} [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Create and push tag
        if: ${{ !inputs.dry_run }}
        run: |
          git tag -a "${{ steps.ver.outputs.next }}" -m "Release ${{ steps.ver.outputs.next }}"
          git push origin "${{ steps.ver.outputs.next }}"

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.next }}
          name: ${{ steps.ver.outputs.next }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/claude-sync-darwin-arm64
            dist/claude-sync-linux-arm64
            dist/claude-sync-linux-amd64
            dist/SHA256SUMS

      - name: Dry-run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "## Dry run — ${{ steps.ver.outputs.next }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat RELEASE_NOTES.md >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
